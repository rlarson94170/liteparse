[package]
name = "liteparse-rs"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "lit"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5.55", features = ["derive"] }
image = { version = "0.25", default-features = false, features = ["png"] }
pdfium = { path = "../pdfium" }
pdfium-sys = { path = "../pdfium-sys" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tesseract-rs = { version = "0.2", features = ["build-tesseract"] }
